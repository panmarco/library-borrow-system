<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圖書借閱系統 - 會員註冊</title>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>

    <link rel="stylesheet" href="./css/register.css">
</head>

<body>

    <div id="app" class="register-container">
        <h2>圖書借閱系統 - 會員註冊</h2>

        <form @submit.prevent="handleRegister">
            <div class="form-item">
                <label>手機號碼（帳號）：</label>
                <input v-model="registerForm.phoneNumber" type="text" placeholder="請輸入手機號碼" required />
            </div>

            <div class="form-item">
                <label>使用者名稱（姓名）：</label>
                <input v-model="registerForm.userName" type="text" placeholder="請輸入姓名" required />
            </div>

            <div class="form-item">
                <label>設定密碼：</label>
                <input v-model="registerForm.password" type="password" placeholder="請輸入密碼" required />
            </div>

            <button type="submit" class="btn-submit">確認註冊</button>
        </form>

        <hr class="divider" />

        <div class="login-redirect">
            <p>已經有帳號了嗎？</p>
            <button class="btn-back" @click="goToLogin">返回登入頁面</button>
        </div>
    </div>

    <script src="./js/register.js"></script>
</body>

</html>
